name: Сборка релиза

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Установить JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Подготовить Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Разрешить запуск Gradle wrapper
        working-directory: android
        run: chmod +x gradlew

      - name: Собрать Android APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Подготовить файлы релиза
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk "dist/shopping-list-android-${TAG}.apk"
          zip -r "dist/shopping-list-server-${TAG}.zip" \
            backend \
            docs \
            README.md \
            .env.example \
            docker-compose.yml \
            docker-compose.github-build.yml \
            docker-compose.truenas-custom.yml \
            docker-compose.ghcr.yml
          git archive --format zip --output "dist/shopping-list-source-${TAG}.zip" HEAD

      - name: Опубликовать релиз
        uses: softprops/action-gh-release@v2
        with:
          name: Список покупок ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          prerelease: false
          make_latest: true
          files: |
            dist/shopping-list-android-${{ github.ref_name }}.apk
            dist/shopping-list-server-${{ github.ref_name }}.zip
            dist/shopping-list-source-${{ github.ref_name }}.zip
